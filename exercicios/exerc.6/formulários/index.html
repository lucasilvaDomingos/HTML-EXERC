<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formulários</title>
</head>
<body>
    <form action="exemplo.php" method="get">
        <p><strong><label for="Nome">Nome:</label><input type="text" name="Nome" id="Nome"></strong></p>
        <p><input type="submit" value="Confirmar"></p>
    </form>
    <form action="exemplo.php" method="post" autocomplete="on">
        <fieldset>
            <legend>Teste de formulário</legend>
            <br>
            <div>
                <label for="iNome"><strong>Nome:</strong></label>
            <input type="text" name="Nome" id="iNome" required placeholder="Nome" minlength="3" maxlength="15" autocomplete="name" >
            </div>
            <br>
            <div>
                <label for="Email"><strong>Email:</strong></label>
            <input type="email" name="Email" id="Email" required placeholder="@gmail.com" minlength="15" maxlength="30" autocomplete="email">
            </div> 
            <br>
            <div>
                <label for=""><strong>Telefone:</strong></label>
                <input type="tel" name="Tel" id="iTel" pattern="^\(\d{2}\)\d{4,5}-\d{4}$">
            </div>
            <br>
            <div>
                <label for="Senha"><strong>Senha:</strong></label>
                <input type="password" name="Senha" id="Senha" required placeholder="*****" minlength="8" maxlength="20" autocomplete="current-password">
            </div>
            <br>
            <div>
                <strong><label for="Data">Data:</label></strong>
                <input type="date" name="Data">
            </div>
            <br>
        </fieldset>
        <br>
        <div>
            <input type="submit" value="Confirmar">
            <input type="reset" value="Apagar">
        </div>
    </form>
    <br>
    <form action="">
        <fieldset>
            <legend>Dados sobre Video Game</legend>
            <div>
                <legend>Seus jogos Favoritos</legend>
                <div id="marcação">
                    <input type="checkbox" name="Hades" id="Hades"><label for="Hades">Hades</label>
                    <br>
                    <input type="checkbox" name="Outer wilds" id="Outer Wilds"><label for="Outer Wilds">Outer Wilds</label>
                    <br>
                    <input type="checkbox" name="Mario Kart" id="Mario Kart"><label for="Mario Kart">Mario Kart</label>
                    <br>
                    <input type="checkbox" name="Minecraft" id="Minecraft"><label for="Minecraft">Minecraft</label>
                    <br>
                </div>
            </fieldset>
            <br>
            <fieldset>
                <legend>Seu Gênero de jogos Favorito</legend>
                <div><!-- é preciso por o mesmo 'name' nos radios porque se não vai dar pra marcar mais de uma opção -->
                    <input type="radio" name="único" id="rogue">
                    <label for="rogue">Rogue Like</label>
                    <br>
                    <input type="radio" name="único" id="indie">
                    <label for="indie">Indie</label>
                    <br>
                    <input type="radio" name="único" id="aventura">
                    <label for="aventura">Aventura</label>
                    <br>
                    <input type="radio" name="único" id="puzzel">
                    <label for="puzzel">Puzzel</label>
                    <br>
                    <input type="radio" name="único" id="fps">
                    <label for="fps">FPS</label>
                    <br>
                    <input type="radio" name="único" id="ação">
                    <label for="ação">Ação</label>
                    <br>
                </div>
            </fieldset>
        </fieldset>
    <div action="" method="post">
        <fieldset>
            <legend>informações do usuário</legend>
            <div>
                <label for="cor">Cor</label>
                <input type="color" name="cor" id="cor" value="#ffffff">
                <br>
                <label for="foto">Foto de Perfil</label>
                <input type="file" name="foto" id="foto">
                <br>
                <label for="satis">Nível de Satisfação</label>
                <input type="range" name="satis" id="satis" min="1" max="5">
            </div>
        </fieldset>
    <br>
    <div action="">
        <label for="teste2">Seu Bairro:</label>
        <input type="text" name="teste2" id="teste2" list="bairros">
        <datalist id="bairros"> <!-- possui esse id para relacionar com o input, basicamente o que o 'name' faz -->
            <option value="Payol 1"></option>
            <option value="Payol 2"></option>
            <option value="Green Hills"></option>
            <option value="Alaide"></option>
            <option value="Centro"></option>
        </datalist>
    </div>
    <br>
    <div action="">
        <label for="teste">Cores:</label>
        <select name="teste" id="teste">
            <optgroup label="Cores Primárias"><!-- esse label funciona como um paramêtro -->
                <option value="azul">Azul</option>
                <option value="verm">Vermelho</option>
                <option value="amare">Amarelo</option>
            </optgroup>
            
            <optgroup label="Cores Secundárias"><
                <option value="verde" selected>Verde</option>
                <option value="laran">Laranja</option>
                <option value="roxo">roxo</option>
            </optgroup>
        </select>
    </div>    
    <div>
        <label for="coment">Faça um comentário:</label>
        <br>
        <textarea name="coment" id="coment" cols="30" rows="10" required minlength="5" maxlength="50">

        </textarea>
    </div>
    </form>
</body>
</html>
