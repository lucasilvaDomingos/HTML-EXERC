<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iframes</title>
    <link rel="stylesheet" href="estilo/cor1.css" />
  </head>
  <body>
    <!-- por padrão o iframe possui 300x150 de tamanho -->
    <iframe
      src="https://lucasilvadomingos.github.io/Cordel-Moderno/"
      frameborder="0"
      scrolling="yes"
      id="fram"
    >
      <!-- Esse espaço serve para colocar uma mensagem ou redirecionar o link caso o  iframe não funcione -->
    </iframe>
    <iframe
      width="560"
      height="315"
      src="https://www.youtube.com/embed/xdap5e3-DwM?si=gBQJkV9ERLBnPSGL"
      title="YouTube video player"
      frameborder="0"
      allow="
        accelerometer;
        autoplay;
        clipboard-write;
        encrypted-media;
        gyroscope;
        picture-in-picture;
        web-share;
      "
      referrerpolicy="strict-origin-when-cross-origin"
      allowfullscreen
    ></iframe>
    <iframe
      src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d29293.804190668267!2d-47.00975963381801!3d-23.398144800357258!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x94cf17521852e0ad%3A0xe905fa9b65caa5c8!2sPirapora%20do%20Bom%20Jesus%20-%20Parque%20das%20Avencas%2C%20Pirapora%20do%20Bom%20Jesus%20-%20SP%2C%2006550-000!5e0!3m2!1spt-BR!2sbr!4v1772740363970!5m2!1spt-BR!2sbr"
      width="600"
      height="450"
      style="border: 0"
      allowfullscreen=""
      loading="lazy"
      referrerpolicy="no-referrer-when-downgrade"
    ></iframe>
  </body>
</html>
