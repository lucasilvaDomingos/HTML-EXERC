<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *{
            margin: 0px;
            padding: 0px;
        }
        #container{
            display: grid;
            height: 100vh;
            width: 100vw;
            grid-template:100px 50px 1fr 80px/1fr 150px;
            gap: 10px;
            place-content:center;
        }
        .items{
            border: 2px dashed #006aff;
            font-size: 1em;
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
        }
        header{
            grid-area: 1/1/1/3;
        }
        menu{
            grid-area: 2/1/2/3;
        }
        section{
            grid-area: 3/1/3/2;
        }
        aside{
            grid-area:3/2/3/3;
        }
        footer{
            grid-area:4/1/4/3;
        }
    </style>
    <title>Desafio de grid</title>
</head>
<body>
    <main id="container">
        <header class="items"><p>Topo</p></header>
        <menu class="items"><p>Menu</p></menu>
        <section class="items"><p>Principal</p></section>
        <aside class="items"><p>Secundário</p></aside>
        <footer class="items"><p>Rodapé</p></footer>
    </main>
</body>
</html>
